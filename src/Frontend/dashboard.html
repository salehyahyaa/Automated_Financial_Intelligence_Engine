<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Financial Engine – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>


<body>
  <!-- Sliding nav drawer (opens from left) -->
  <div class="nav-drawer" id="nav-drawer" aria-hidden="true">
    <div class="nav-drawer-overlay" id="nav-drawer-overlay" aria-label="Close menu"></div>
    <aside class="nav-drawer-panel" role="navigation" aria-label="Main navigation">
      <div class="nav-drawer-header">
        <span class="nav-drawer-title">Menu</span>
        <button type="button" class="nav-drawer-close" id="nav-drawer-close" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18"/><path d="M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <ul class="nav-drawer-list">
        <li><a href="#" class="nav-drawer-link nav-drawer-link--active">Dashboard</a></li>
        <li><a href="#" class="nav-drawer-link" data-action="connected-accounts">Connected accounts</a></li>
        <li><a href="#" class="nav-drawer-link" data-action="settings">Settings</a></li>
      </ul>
    </aside>
  </div>

  <div class="shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-nav-stack">
          <button class="hamburger" id="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <button type="button" class="refresh-btn" id="refresh-btn" aria-label="Refresh">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 11-9-9 9 0 019 9"/>
              <path d="M21 3v6h-6"/>
            </svg>
          </button>
        </div>

        <div class="brand">
          <div class="brand-logo"></div>
          <div>
            <div class="brand-text-title">Financial Engine</div>
            <div class="brand-text-sub">Automated cash‑flow &amp; risk insights</div>
          </div>
        </div>
      </div>
      <div class="user-pill">
        <div class="user-avatar"></div>
        <div class="user-name">Your Profile</div>
      </div>
    </header>

    <main class="main-with-chat">
      <div class="chat-workspace">
        <div class="chat-column" id="chat-column">
          <div class="chat-resize-handle" id="chat-resize-handle" aria-label="Resize chat panel"></div>
          <div class="chat-messages" id="chat-messages">
            <div class="chat-message chat-message-assistant">
            <div class="chat-message-bubble">
              <p>Hi. I’m your Financial Engine assistant. Ask about your accounts, spending, or cash flow and I’ll help using your linked data.</p>
            </div>
          </div>
          </div>
          <div class="chat-input-wrapper">
            <textarea
              id="chat-input"
              class="chat-input"
              placeholder="Ask anything..."
              rows="1"
            ></textarea>
            <div class="chat-input-actions">
              <div class="chat-mode-dropdown-wrap">
                <button type="button" id="chat-extra-btn" class="chat-extra-button" aria-label="Chat mode" aria-haspopup="true" aria-expanded="false">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                  </svg>
                </button>
                <div class="chat-mode-dropdown" id="chat-mode-dropdown" role="menu">
                  <button type="button" class="chat-mode-dropdown-item" data-action="connect-bank" role="menuitem">Connect bank account</button>
                </div>
              </div>
              <button id="chat-send" class="send-button" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M5 12l14-7-4 7 4 7z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="plaid.js"></script>
  <script src="chatbox.js"></script>
  <script src="refresh.js"></script>
  <script src="nav-drawer.js"></script>
</body>
</html>
